<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Match Entry and Faction Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        // Updated to Victoria Royals Palette
                        "primary": "#00539B", // Vibrant Blue from logo (Royals Blue)
                        "primary-light": "#3b8edb", // Lighter blue for gradients
                        "secondary": "#C8102E", // Red from the maple leaf
                        "accent-silver": "#A2A9AD", // Silver Grey from logo
                        "accent-dark": "#00204d", // Deep Navy Blue for accents
                        "background-light": "#f0f2f5",
                        "background-dark": "#121214", // Deep Charcoal
                        "surface-dark": "#1C1C1F", // Slightly lighter charcoal
                        "surface-highlight": "#2C2C30", // Highlight for surfaces
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    boxShadow: {
                        'glow-primary': '0 0 25px -5px rgba(0, 83, 155, 0.6)', // Blue glow
                        'glow-secondary': '0 0 20px -5px rgba(200, 16, 46, 0.5)', // Red glow
                        'inner-glow': 'inset 0 0 30px 0 rgba(0,0,0,0.7)',
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #121214;
        }
        ::-webkit-scrollbar-thumb {
            background: #2C2C30;
            border-radius: 3px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-y-auto">
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-accent-dark/30 to-transparent"></div>
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary/20 rounded-full blur-[100px]"></div>
<div class="absolute top-1/2 -left-20 w-72 h-72 bg-accent-silver/5 rounded-full blur-[80px]"></div>
</div>
<div class="sticky top-0 z-20 flex items-center bg-background-dark/80 backdrop-blur-md p-4 pb-2 justify-between border-b border-surface-highlight">
<button class="text-slate-100 flex size-12 shrink-0 items-center justify-center hover:bg-surface-highlight rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center">Match Entry</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex size-12 cursor-pointer items-center justify-center overflow-hidden rounded-full bg-transparent text-white hover:bg-surface-highlight transition-colors">
<span class="material-symbols-outlined">help</span>
</button>
</div>
</div>
<div class="flex-1 flex flex-col items-center px-4 pt-6 pb-24 max-w-md mx-auto w-full z-10">
<div class="w-full relative mb-8">
<div class="absolute inset-0 bg-primary/30 blur-3xl rounded-full opacity-40"></div>
<h1 class="text-white tracking-tight text-[32px] font-bold leading-tight text-center relative z-10 drop-shadow-lg mb-6">Welcome to the Arena</h1>
<div class="relative w-full aspect-[2/1] rounded-2xl overflow-hidden bg-surface-dark border border-surface-highlight shadow-inner-glow group ring-1 ring-accent-silver/20">
<div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1516280440614-6697288d5d38?q=80&amp;w=2070&amp;auto=format&amp;fit=crop')] bg-cover bg-center opacity-40 grayscale mix-blend-screen" data-alt="Abstract stadium lights line art" style="filter: contrast(1.2) brightness(0.8);"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark via-transparent to-accent-dark/40"></div>
<div class="absolute bottom-4 left-4 right-4 flex justify-between items-end">
<div>
<p class="text-xs text-accent-silver uppercase tracking-widest font-bold mb-1">Live Event</p>
<p class="text-lg font-bold text-white">Royals vs Giants</p>
</div>
<div class="flex items-center gap-1 text-secondary">
<span class="material-symbols-outlined text-[18px] animate-pulse">sensors</span>
<span class="text-xs font-bold uppercase text-white">Live</span>
</div>
</div>
</div>
</div>
<button class="group relative w-full flex items-center justify-center gap-3 bg-gradient-to-br from-surface-dark to-accent-dark/40 hover:to-primary/20 border border-primary/40 hover:border-primary text-white p-4 rounded-xl transition-all duration-300 shadow-glow-primary mb-6 overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-r from-primary/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-primary text-3xl group-hover:text-white transition-colors">qr_code_scanner</span>
<div class="flex flex-col items-start z-10">
<span class="text-lg font-bold leading-none">Scan Digital Ticket</span>
<span class="text-xs text-accent-silver font-medium mt-1">Instant entry verification</span>
</div>
<span class="material-symbols-outlined text-accent-silver ml-auto group-hover:text-white transition-colors z-10">chevron_right</span>
</button>
<div class="flex items-center w-full gap-4 mb-6">
<div class="h-px bg-surface-highlight flex-1"></div>
<span class="text-xs text-accent-silver font-bold uppercase tracking-wider">Or enter manually</span>
<div class="h-px bg-surface-highlight flex-1"></div>
</div>
<div class="w-full mb-8">
<label class="block text-sm font-medium text-accent-silver mb-2 pl-1">Seat Number</label>
<div class="relative">
<input class="w-full bg-surface-dark border-surface-highlight text-white placeholder-slate-600 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary py-3 pl-12 pr-4 transition-all outline-none" placeholder="e.g. A-124" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-accent-silver">chair_alt</span>
</div>
</div>
<div class="w-full mb-8">
<h3 class="text-white text-md font-bold mb-4 pl-1">Choose Your Side</h3>
<div class="grid grid-cols-2 gap-4">
<label class="cursor-pointer group relative">
<input checked="" class="peer sr-only" name="faction" type="radio"/>
<div class="absolute inset-0 bg-primary/30 blur-xl opacity-0 peer-checked:opacity-50 transition-opacity"></div>
<div class="relative flex flex-col items-center p-4 bg-surface-dark border-2 border-surface-highlight peer-checked:border-primary peer-checked:bg-gradient-to-br peer-checked:from-primary/20 peer-checked:to-accent-dark/40 rounded-xl transition-all h-full">
<div class="size-12 rounded-full bg-primary/10 flex items-center justify-center mb-3 text-primary peer-checked:bg-primary peer-checked:text-white transition-colors ring-1 ring-primary/20 peer-checked:ring-0">
<span class="material-symbols-outlined">home_pin</span>
</div>
<span class="text-white font-bold text-lg mb-1">Royals</span>
<span class="text-xs text-accent-silver text-center">Home Team</span>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-primary">
<span class="material-symbols-outlined text-xl">check_circle</span>
</div>
</div>
</label>
<label class="cursor-pointer group relative">
<input class="peer sr-only" name="faction" type="radio"/>
<div class="absolute inset-0 bg-secondary/20 blur-xl opacity-0 peer-checked:opacity-40 transition-opacity"></div>
<div class="relative flex flex-col items-center p-4 bg-surface-dark border-2 border-surface-highlight peer-checked:border-secondary peer-checked:bg-gradient-to-br peer-checked:from-secondary/10 peer-checked:to-surface-dark rounded-xl transition-all h-full">
<div class="size-12 rounded-full bg-secondary/10 flex items-center justify-center mb-3 text-secondary peer-checked:bg-secondary peer-checked:text-white transition-colors ring-1 ring-secondary/20 peer-checked:ring-0">
<span class="material-symbols-outlined">flight_takeoff</span>
</div>
<span class="text-white font-bold text-lg mb-1">Visitors</span>
<span class="text-xs text-accent-silver text-center">Away Team</span>
<div class="absolute top-2 right-2 opacity-0 peer-checked:opacity-100 text-secondary">
<span class="material-symbols-outlined text-xl">check_circle</span>
</div>
</div>
</label>
</div>
</div>
<button class="w-full bg-gradient-to-r from-primary via-[#006bd1] to-primary text-white font-bold text-lg py-4 rounded-xl shadow-[0_0_30px_-5px_rgba(0,83,155,0.6)] hover:shadow-[0_0_40px_-5px_rgba(0,83,155,0.8)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group mt-auto border border-white/10">
<span>Enter the Pulse</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform text-white">bolt</span>
</button>
</div>
<div class="fixed bottom-0 w-full z-30 border-t border-surface-highlight bg-background-dark/95 backdrop-blur-xl pb-6 pt-2 safe-area-bottom">
<div class="flex justify-around items-center px-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 rounded-full text-white group" href="#">
<div class="flex h-8 items-center justify-center group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px] filled text-primary">home</span>
</div>
<span class="text-[10px] font-medium text-white group-hover:text-white transition-colors">Home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 group hover:text-white transition-colors" href="#">
<div class="flex h-8 items-center justify-center group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">confirmation_number</span>
</div>
<span class="text-[10px] font-medium">Tickets</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 group hover:text-white transition-colors" href="#">
<div class="flex h-8 items-center justify-center group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">emoji_events</span>
</div>
<span class="text-[10px] font-medium">Rewards</span>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-500 group hover:text-white transition-colors" href="#">
<div class="flex h-8 items-center justify-center group-hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">person</span>
</div>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</div>
</div>
